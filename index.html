<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #8b8d9a;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --green: #22c55e;
      --orange: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }

    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.25rem; }

    .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }

    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: end;
      margin-bottom: 1.5rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }

    .field label {
      font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted);
    }

    select, input {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }

    select:focus, input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    select { cursor: pointer; min-width: 180px; }
    input[type="text"]#basePace { width: 100px; font-variant-numeric: tabular-nums; }


    .graph-container {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; position: relative;
    }

    .graph-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }

    .graph-title { font-size: 0.95rem; font-weight: 600; }
    .graph-hint { font-size: 0.8rem; color: var(--text-muted); }

    canvas { display: block; width: 100%; border-radius: 8px; }

    .point-controls { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: nowrap; overflow-x: auto; }
    .point-controls button { white-space: nowrap; padding: 0.45rem 0.75rem; font-size: 0.8rem; }

    button {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s;
    }

    button:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
    button.danger:hover { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }

    .unit-toggle {
      display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }

    .unit-toggle button { border: none; border-radius: 0; padding: 0.6rem 1rem; font-size: 0.85rem; }
    .unit-toggle button.active { background: var(--accent); color: white; }

    .section-instructions {
      color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.75rem;
    }

    .analysis-bar {
      display: flex; align-items: baseline; gap: 1.5rem; flex-wrap: wrap;
      margin-top: 2rem; margin-bottom: 1rem;
      padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
    }

    .analysis-title {
      font-size: 1.2rem; font-weight: 700; margin: 0;
    }

    .analysis-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; }

    .analysis-stat { display: flex; align-items: baseline; gap: 0.4rem; }

    .analysis-label {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted);
    }

    .analysis-value {
      font-size: 1.1rem; font-weight: 700; font-variant-numeric: tabular-nums;
    }

    .analysis-value.accent { color: var(--accent); }
    .analysis-value.green { color: var(--green); }
    .analysis-value.orange { color: var(--orange); }

    /* Segment editor */
    .segments { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }

    .segment-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.25rem; display: flex;
      align-items: center; gap: 1rem; transition: border-color 0.2s;
    }

    .segment-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

    .seg-pace {
      font-size: 1.3rem; font-weight: 700; font-variant-numeric: tabular-nums;
      min-width: 70px; text-align: center; flex-shrink: 0;
    }

    .seg-slider-wrap { flex: 1; display: flex; align-items: center; gap: 0.4rem; min-width: 0; }

    .seg-nudge {
      width: 44px; height: 44px; min-width: 44px; border-radius: 50%;
      font-size: 1.4rem; font-weight: 700; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; padding: 0;
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      cursor: pointer; transition: all 0.15s; line-height: 1;
    }

    .seg-nudge:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
    .seg-nudge:active { background: rgba(99, 102, 241, 0.2); transform: scale(0.95); }

    .seg-slider {
      -webkit-appearance: none; appearance: none; flex: 1; height: 8px;
      background: var(--border); border-radius: 4px; outline: none; cursor: pointer;
    }

    .seg-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 28px; height: 28px;
      border-radius: 50%; background: var(--accent); cursor: grab; border: 2px solid white;
    }

    .seg-slider::-moz-range-thumb {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); cursor: grab; border: 2px solid white;
    }

    .seg-btn {
      padding: 0.5rem 0.85rem; font-size: 0.95rem; min-width: 44px;
      min-height: 44px; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center;
    }

    .seg-btn.remove { color: #ef4444; font-size: 1.2rem; }
    .seg-btn.remove:hover { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }

    .seg-actions { display: flex; gap: 0.5rem; flex-shrink: 0; align-items: center; }

    .split-input {
      width: 65px; padding: 0.45rem 0.5rem; font-size: 1rem;
      font-variant-numeric: tabular-nums; text-align: center;
    }

    .seg-bounds {
      display: flex; align-items: center; gap: 0.3rem;
      min-width: 120px; flex-shrink: 0;
    }

    .bound-input {
      width: 52px; padding: 0.4rem 0.35rem; font-size: 0.95rem;
      font-variant-numeric: tabular-nums; text-align: center;
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px;
    }

    .bound-input:focus { border-color: var(--accent); }

    .bound-fixed {
      font-size: 0.95rem; color: var(--text-muted); font-variant-numeric: tabular-nums;
      width: 52px; text-align: center; display: inline-block;
    }

    .bound-dash { color: var(--text-muted); font-size: 0.95rem; }
    .bound-unit { color: var(--text-muted); font-size: 0.85rem; margin-left: 0.15rem; }


    /* Splits table */
    .splits-table {
      margin-top: 1.5rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    }

    .splits-table table { width: 100%; border-collapse: collapse; }

    .splits-table th {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted); text-align: left;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
    }

    .splits-table td {
      padding: 0.55rem 1rem; font-size: 0.9rem; font-variant-numeric: tabular-nums;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .splits-table tr:last-child td { border-bottom: none; }
    .splits-table tr:hover td { background: rgba(255,255,255,0.02); }
    .splits-table .split-fast { color: var(--green); }
    .splits-table .split-slow { color: #ef4444; }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      h1 { font-size: 1.4rem; }
      .segment-card { flex-wrap: wrap; gap: 0.75rem; padding: 1rem; }
      .seg-slider-wrap { min-width: 100%; order: 10; }
      .seg-pace { font-size: 1.4rem; }
      .seg-bounds { min-width: 100%; order: -1; }
      .bound-input { width: 60px; padding: 0.5rem; font-size: 1rem; }
      .bound-fixed { width: 60px; font-size: 1rem; }
      .seg-actions { margin-left: auto; }
      .analysis-bar { gap: 0.75rem; }
      .analysis-stats { gap: 1rem; }
    }
  </style>
</head>
<body>

<h1>Race Calculator</h1>
<p class="subtitle">Build a pacing strategy and see your projected splits</p>

<div class="controls">
  <div class="field">
    <label>Race Distance</label>
    <select id="distance">
      <option value="5">5K</option>
      <option value="10">10K</option>
      <option value="15">15K</option>
      <option value="21.0975" selected>Half Marathon</option>
      <option value="42.195">Marathon</option>
      <option value="50">50K Ultra</option>
      <option value="80.4672">50 Mile Ultra</option>
      <option value="100">100K Ultra</option>
      <option value="160.934">100 Mile Ultra</option>
    </select>
  </div>
  <div class="field">
    <label>Base Pace (min/mi)</label>
    <input type="text" id="basePace" value="8:30" placeholder="M:SS" inputmode="numeric">
  </div>
  <div class="field">
    <label>Units</label>
    <div class="unit-toggle">
      <button data-unit="km" onclick="setUnit('km')">km</button>
      <button class="active" data-unit="mi" onclick="setUnit('mi')">mi</button>
    </div>
  </div>
</div>

<p class="section-instructions">Use the sliders to set your pace for each segment. Split a segment to vary your effort across the race.</p>

<div class="point-controls" style="margin-bottom: 1rem;">
  <button onclick="resetPoints()">Reset to flat</button>
  <button onclick="presetNegativeSplit()">Negative split</button>
  <button onclick="presetPositiveSplit()">Positive split</button>
  <button onclick="presetFadeFinish()">Late fade</button>
</div>

<div class="segments" id="segmentEditor"></div>

<div class="analysis-bar">
  <h2 class="analysis-title">Analysis</h2>
  <div class="analysis-stats">
    <div class="analysis-stat">
      <span class="analysis-label">Finish</span>
      <span class="analysis-value accent" id="finishTime">--:--:--</span>
    </div>
    <div class="analysis-stat">
      <span class="analysis-label">Avg Pace</span>
      <span class="analysis-value green" id="avgPace">--:--</span>
    </div>
    <div class="analysis-stat">
      <span class="analysis-label">Avg Speed</span>
      <span class="analysis-value orange" id="avgSpeed">-- mph</span>
    </div>
  </div>
</div>

<div class="graph-container">
  <div class="graph-header">
    <span class="graph-title">Pacing Profile</span>
  </div>
  <canvas id="graph"></canvas>
</div>

<div class="splits-table" id="splitsContainer">
  <table>
    <thead>
      <tr>
        <th>Split</th>
        <th>Pace</th>
        <th>Split Time</th>
        <th>Elapsed</th>
      </tr>
    </thead>
    <tbody id="splitsBody"></tbody>
  </table>
</div>

<script>
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
const distSelect = document.getElementById('distance');
const basePaceInput = document.getElementById('basePace');

const KM_TO_MI = 0.621371;
let unit = 'mi';
let dpr = window.devicePixelRatio || 1;

const PACE_MIN_MULT = 0.45;
const PACE_MAX_MULT = 1.6;

// Each point marks the start of a flat segment. y is in [0,1] mapped to multiplier range.
let points = [
  { x: 0, y: (1.0 - PACE_MIN_MULT) / (PACE_MAX_MULT - PACE_MIN_MULT) },
];

let selectedSegment = 0;

const GRAPH_PADDING = { top: 30, right: 20, bottom: 45, left: 70 };
const POINT_RADIUS = 5;

function yToPaceMultiplier(y) {
  return PACE_MIN_MULT + y * (PACE_MAX_MULT - PACE_MIN_MULT);
}

function paceMultiplierToY(m) {
  return (m - PACE_MIN_MULT) / (PACE_MAX_MULT - PACE_MIN_MULT);
}

function getDistance() { return parseFloat(distSelect.value); }

function parsePace(str) {
  str = str.trim();
  if (str.includes(':')) {
    const [m, s] = str.split(':');
    return parseInt(m, 10) + (parseInt(s, 10) || 0) / 60;
  }
  return parseFloat(str) || 0;
}

function decimalToMSS(dec) {
  const totalSeconds = Math.round(dec * 60);
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function getBasePace() { return parsePace(basePaceInput.value) || 8.5; }

function getDisplayDistance() {
  const km = getDistance();
  return unit === 'mi' ? km * KM_TO_MI : km;
}

function setUnit(u) {
  const oldUnit = unit;
  unit = u;
  document.querySelectorAll('.unit-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.unit === u);
  });
  const label = basePaceInput.parentElement.querySelector('label');
  label.textContent = unit === 'mi' ? 'Base Pace (min/mi)' : 'Base Pace (min/km)';
  const currentPace = parsePace(basePaceInput.value);
  if (oldUnit === 'km' && u === 'mi') {
    basePaceInput.value = decimalToMSS(currentPace / KM_TO_MI);
  } else if (oldUnit === 'mi' && u === 'km') {
    basePaceInput.value = decimalToMSS(currentPace * KM_TO_MI);
  }
  refresh();
}

function sortPoints() { points.sort((a, b) => a.x - b.x); }

function getGraphArea() {
  const rect = canvas.getBoundingClientRect();
  return {
    x: GRAPH_PADDING.left, y: GRAPH_PADDING.top,
    w: rect.width * dpr - GRAPH_PADDING.left - GRAPH_PADDING.right,
    h: rect.height * dpr - GRAPH_PADDING.top - GRAPH_PADDING.bottom,
  };
}

function getViewRange() {
  let minY = Infinity, maxY = -Infinity;
  const baseY = paceMultiplierToY(1.0);
  for (const p of points) { minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y); }
  minY = Math.min(minY, baseY);
  maxY = Math.max(maxY, baseY);

  const basePace = getBasePace();
  const oneMinRange = 1.0 / basePace / (PACE_MAX_MULT - PACE_MIN_MULT);
  const minSpan = Math.max(0.25, oneMinRange * 2);

  let span = maxY - minY;
  if (span < minSpan) {
    const mid = (minY + maxY) / 2;
    minY = mid - minSpan / 2;
    maxY = mid + minSpan / 2;
    span = minSpan;
  }

  const pad = span * 0.3;
  minY -= pad;
  maxY += pad;
  minY = Math.max(0, minY);
  maxY = Math.min(1, maxY);
  return { minY, maxY };
}

function interpolatePace(fraction) {
  for (let i = points.length - 1; i >= 0; i--) {
    if (fraction >= points[i].x) return yToPaceMultiplier(points[i].y);
  }
  return yToPaceMultiplier(points[0].y);
}

// --- Calculations ---

function recalc() {
  const distKm = getDistance();
  const basePace = getBasePace();
  const steps = 500;
  let totalMinutes = 0;

  for (let i = 0; i < steps; i++) {
    const frac = (i + 0.5) / steps;
    const mult = interpolatePace(frac);
    const segmentDist = distKm / steps;
    const segmentInUnit = unit === 'mi' ? segmentDist * KM_TO_MI : segmentDist;
    totalMinutes += segmentInUnit * basePace * mult;
  }

  const avgPacePerUnit = totalMinutes / (unit === 'mi' ? distKm * KM_TO_MI : distKm);
  const avgSpeedKmh = (distKm / totalMinutes) * 60;
  const avgSpeedDisplay = unit === 'mi' ? avgSpeedKmh * KM_TO_MI : avgSpeedKmh;

  document.getElementById('finishTime').textContent = formatTime(totalMinutes);
  document.getElementById('avgPace').textContent = formatPace(avgPacePerUnit) + '/' + (unit === 'mi' ? 'mi' : 'km');
  document.getElementById('avgSpeed').textContent = avgSpeedDisplay.toFixed(1) + (unit === 'mi' ? ' mph' : ' km/h');

  renderSplits(distKm, basePace);
}

function renderSplits(distKm, basePace) {
  const tbody = document.getElementById('splitsBody');
  const splitUnitKm = unit === 'mi' ? 1 / KM_TO_MI : 1;
  const totalSplits = Math.ceil(distKm / splitUnitKm);
  const steps = 200;
  let elapsed = 0;
  let rows = '';

  for (let s = 0; s < totalSplits; s++) {
    const startKm = s * splitUnitKm;
    const endKm = Math.min((s + 1) * splitUnitKm, distKm);
    const segKm = endKm - startKm;
    let splitTime = 0;

    for (let i = 0; i < steps; i++) {
      const frac = (startKm + (i + 0.5) * segKm / steps) / distKm;
      const mult = interpolatePace(frac);
      const segDist = unit === 'mi' ? (segKm / steps) * KM_TO_MI : segKm / steps;
      splitTime += segDist * basePace * mult;
    }

    elapsed += splitTime;
    const splitDist = unit === 'mi' ? segKm * KM_TO_MI : segKm;
    const splitPace = splitTime / splitDist;
    const isLast = endKm >= distKm - 0.001;
    const splitLabel = isLast && splitDist < 0.99
      ? `${(s + splitDist).toFixed(2)} ${unit}`
      : `${s + 1}`;
    const paceClass = splitPace < basePace * 0.97 ? 'split-fast' : splitPace > basePace * 1.03 ? 'split-slow' : '';

    rows += `<tr>
      <td>${splitLabel}</td>
      <td class="${paceClass}">${formatPace(splitPace)}/${unit}</td>
      <td>${formatTime(splitTime)}</td>
      <td>${formatTime(elapsed)}</td>
    </tr>`;
  }

  tbody.innerHTML = rows;
}

function formatTime(minutes) {
  const h = Math.floor(minutes / 60);
  const m = Math.floor(minutes % 60);
  const s = Math.floor((minutes * 60) % 60);
  if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function formatPace(minPerUnit) {
  const totalSeconds = Math.round(minPerUnit * 60);
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

// --- Drawing ---

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
}

function draw() {
  resizeCanvas();
  const w = canvas.width;
  const h = canvas.height;
  const area = getGraphArea();
  const basePace = getBasePace();
  const view = getViewRange();
  const dispDist = getDisplayDistance();

  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;

  function mapY(py) {
    return area.y + ((py - view.minY) / (view.maxY - view.minY)) * area.h;
  }

  // Pace grid
  const viewMinPace = basePace * yToPaceMultiplier(view.minY);
  const viewMaxPace = basePace * yToPaceMultiplier(view.maxY);
  const firstTick = Math.ceil(viewMinPace * 2) / 2;
  const lastTick = Math.floor(viewMaxPace * 2) / 2;
  for (let pace = firstTick; pace <= lastTick; pace += 0.5) {
    const mult = pace / basePace;
    const yFrac = paceMultiplierToY(mult);
    const y = mapY(yFrac);
    if (y < area.y - 1 || y > area.y + area.h + 1) continue;
    ctx.beginPath(); ctx.moveTo(area.x, y); ctx.lineTo(area.x + area.w, y); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = `${11 * dpr}px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(formatPace(pace), area.x - 8, y);
  }

  // Distance grid
  let distTick = 0.5;
  if (dispDist > 20) distTick = 1;
  if (dispDist > 40) distTick = 2;
  if (dispDist > 80) distTick = 5;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let d = 0; d <= dispDist; d += distTick) {
    const frac = d / dispDist;
    const x = area.x + frac * area.w;
    const isWhole = Math.abs(d - Math.round(d)) < 0.01;
    ctx.strokeStyle = isWhole ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.moveTo(x, area.y); ctx.lineTo(x, area.y + area.h); ctx.stroke();
    if (isWhole || (distTick === 0.5 && dispDist <= 10)) {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillText(isWhole ? Math.round(d).toString() : d.toFixed(1), x, area.y + area.h + 8);
    }
  }

  // Axis labels
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = `${10 * dpr}px -apple-system, system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('Distance', area.x + area.w / 2, area.y + area.h + 28);
  ctx.save();
  ctx.translate(14, area.y + area.h / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('Pace (min/' + unit + ')', 0, 0);
  ctx.restore();

  // Staircase segments
  for (let i = 0; i < points.length; i++) {
    const nextX = i < points.length - 1 ? points[i + 1].x : 1;
    const sy = mapY(points[i].y);
    const sx1 = area.x + points[i].x * area.w;
    const sx2 = area.x + nextX * area.w;
    const isSelected = i === selectedSegment;

    // Fill
    const grad = ctx.createLinearGradient(0, sy, 0, area.y + area.h);
    if (isSelected) {
      grad.addColorStop(0, 'rgba(99, 102, 241, 0.35)');
      grad.addColorStop(1, 'rgba(99, 102, 241, 0.05)');
    } else {
      grad.addColorStop(0, 'rgba(99, 102, 241, 0.15)');
      grad.addColorStop(1, 'rgba(99, 102, 241, 0.02)');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(sx1, sy, sx2 - sx1, area.y + area.h - sy);

    // Stroke top
    ctx.beginPath(); ctx.moveTo(sx1, sy); ctx.lineTo(sx2, sy);
    ctx.strokeStyle = isSelected ? '#818cf8' : '#6366f1';
    ctx.lineWidth = (isSelected ? 3 : 2) * dpr;
    ctx.stroke();

    // Vertical transition
    if (i > 0) {
      const prevSy = mapY(points[i - 1].y);
      ctx.beginPath(); ctx.moveTo(sx1, prevSy); ctx.lineTo(sx1, sy);
      ctx.strokeStyle = 'rgba(99, 102, 241, 0.4)';
      ctx.lineWidth = 1.5 * dpr;
      ctx.setLineDash([3 * dpr, 3 * dpr]);
      ctx.stroke(); ctx.setLineDash([]);
    }

    // Point handle
    const r = POINT_RADIUS * dpr * (isSelected ? 1.3 : 1);
    ctx.beginPath(); ctx.arc(sx1, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = isSelected ? '#818cf8' : '#4f46e5';
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 * dpr; ctx.stroke();
  }

  // Base pace reference line
  const baseYPos = mapY(paceMultiplierToY(1.0));
  ctx.setLineDash([4 * dpr, 4 * dpr]);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(area.x, baseYPos); ctx.lineTo(area.x + area.w, baseYPos); ctx.stroke();
  ctx.setLineDash([]);
}


// --- Segment editor ---

function getSegmentPace(i) {
  return getBasePace() * yToPaceMultiplier(points[i].y);
}

function setSegmentPace(i, pace) {
  const mult = pace / getBasePace();
  points[i].y = Math.max(0, Math.min(1, paceMultiplierToY(mult)));
}

function renderSegmentEditor() {
  const editor = document.getElementById('segmentEditor');
  const basePace = getBasePace();
  const dispDist = getDisplayDistance();
  let html = '';

  for (let i = 0; i < points.length; i++) {
    const nextX = i < points.length - 1 ? points[i + 1].x : 1;
    const startD = (points[i].x * dispDist).toFixed(1);
    const endD = (nextX * dispDist).toFixed(1);
    const pace = getSegmentPace(i);
    const minPace = basePace * PACE_MIN_MULT;
    const maxPace = basePace * PACE_MAX_MULT;
    const isSelected = i === selectedSegment;

    const midD = ((parseFloat(startD) + parseFloat(endD)) / 2).toFixed(1);
    const splitting = (splitState === i);

    const startEditable = i > 0;
    const endEditable = i < points.length - 1;

    html += `<div class="segment-card${isSelected ? ' selected' : ''}" onclick="selectSegment(${i})">
      <div class="seg-bounds">
        ${startEditable
          ? `<input type="text" class="bound-input" value="${startD}" inputmode="decimal"
              onclick="event.stopPropagation()" onchange="setBound(${i},'start',this.value)" title="Start">`
          : `<span class="bound-fixed">${startD}</span>`}
        <span class="bound-dash">&ndash;</span>
        ${endEditable
          ? `<input type="text" class="bound-input" value="${endD}" inputmode="decimal"
              onclick="event.stopPropagation()" onchange="setBound(${i},'end',this.value)" title="End">`
          : `<span class="bound-fixed">${endD}</span>`}
        <span class="bound-unit">${unit}</span>
      </div>
      <div class="seg-pace">${formatPace(pace)}<span style="font-size:0.7rem;font-weight:400;color:var(--text-muted)">/${unit}</span></div>
      <div class="seg-slider-wrap">
        <button class="seg-nudge" onclick="event.stopPropagation();nudgePace(${i}, -1)" title="1 sec faster">−</button>
        <input type="range" class="seg-slider" min="${minPace}" max="${maxPace}" step="0.01" value="${pace}"
          oninput="adjustSegmentPace(${i}, parseFloat(this.value))">
        <button class="seg-nudge" onclick="event.stopPropagation();nudgePace(${i}, 1)" title="1 sec slower">+</button>
      </div>
      <div class="seg-actions">
        ${splitting ? `
          <span style="font-size:0.8rem;color:var(--text-muted)">at ${unit}</span>
          <input type="text" class="split-input" id="splitInput" value="${midD}" inputmode="decimal"
            onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')confirmSplit(${i})">
          <button class="seg-btn" onclick="event.stopPropagation();confirmSplit(${i})">OK</button>
          <button class="seg-btn" onclick="event.stopPropagation();cancelSplit()">Cancel</button>
        ` : `
          <button class="seg-btn" onclick="event.stopPropagation();startSplit(${i})" title="Split">Split</button>
          ${points.length > 1 && i > 0 ? `<button class="seg-btn remove" onclick="event.stopPropagation();removeSegment(${i})" title="Remove">&times;</button>` : ''}
        `}
      </div>
    </div>`;
  }

  editor.innerHTML = html;
}

function selectSegment(i) {
  selectedSegment = i;
  draw();
  renderSegmentEditor();
}

function nudgePace(i, seconds) {
  const currentPace = getSegmentPace(i);
  const newPace = currentPace + seconds / 60;
  const basePace = getBasePace();
  const clamped = Math.max(basePace * PACE_MIN_MULT, Math.min(basePace * PACE_MAX_MULT, newPace));
  setSegmentPace(i, clamped);
  refresh();
}

function adjustSegmentPace(i, pace) {
  setSegmentPace(i, pace);
  recalc();
  draw();
  // Update the pace display without full re-render (avoids losing slider focus)
  const cards = document.querySelectorAll('.segment-card');
  if (cards[i]) {
    cards[i].querySelector('.seg-pace').innerHTML =
      `${formatPace(pace)}<span style="font-size:0.7rem;font-weight:400;color:var(--text-muted)">/${unit}</span>`;
  }
}

let splitState = null; // index of segment being split, or null

function startSplit(i) {
  splitState = i;
  renderSegmentEditor();
  // Auto-focus the input
  setTimeout(() => {
    const input = document.getElementById('splitInput');
    if (input) { input.focus(); input.select(); }
  }, 0);
}

function cancelSplit() {
  splitState = null;
  renderSegmentEditor();
}

function confirmSplit(i) {
  const input = document.getElementById('splitInput');
  if (!input) return;
  const dispDist = getDisplayDistance();
  const splitD = parseFloat(input.value);
  const startD = points[i].x * dispDist;
  const endD = (i < points.length - 1 ? points[i + 1].x : 1) * dispDist;

  if (isNaN(splitD) || splitD <= startD + 0.05 || splitD >= endD - 0.05) {
    // Invalid — flash the input
    input.style.borderColor = '#ef4444';
    setTimeout(() => { input.style.borderColor = ''; }, 500);
    return;
  }

  const splitX = splitD / dispDist;
  const newPt = { x: splitX, y: points[i].y };
  points.splice(i + 1, 0, newPt);
  selectedSegment = i + 1;
  splitState = null;
  refresh();
}

function removeSegment(i) {
  if (i === 0 || points.length <= 1) return;
  points.splice(i, 1);
  if (selectedSegment >= points.length) selectedSegment = points.length - 1;
  refresh();
}

function setBound(i, side, value) {
  const dispDist = getDisplayDistance();
  const d = parseFloat(value);
  if (isNaN(d)) { refresh(); return; }

  const x = d / dispDist;

  if (side === 'start' && i > 0) {
    // Clamp between previous segment's start + tiny gap, and this segment's end - tiny gap
    const prevStart = points[i - 1].x;
    const thisEnd = i < points.length - 1 ? points[i + 1].x : 1;
    const minX = prevStart + 0.005;
    const maxX = thisEnd - 0.005;
    points[i].x = Math.max(minX, Math.min(maxX, x));
  } else if (side === 'end' && i < points.length - 1) {
    // Clamp between this segment's start + tiny gap, and next segment's end - tiny gap
    const thisStart = points[i].x;
    const nextEnd = i + 1 < points.length - 1 ? points[i + 2].x : 1;
    const minX = thisStart + 0.005;
    const maxX = nextEnd - 0.005;
    points[i + 1].x = Math.max(minX, Math.min(maxX, x));
  }

  refresh();
}

// --- Presets ---

function resetPoints() {
  const base = paceMultiplierToY(1.0);
  points = [{ x: 0, y: base }];
  selectedSegment = 0;
  refresh();
}

function presetNegativeSplit() {
  const b = paceMultiplierToY(1.0);
  points = [
    { x: 0, y: b + 0.12 },
    { x: 0.33, y: b },
    { x: 0.66, y: b - 0.1 },
  ];
  selectedSegment = 0;
  refresh();
}

function presetPositiveSplit() {
  const b = paceMultiplierToY(1.0);
  points = [
    { x: 0, y: b - 0.1 },
    { x: 0.33, y: b },
    { x: 0.66, y: b + 0.15 },
  ];
  selectedSegment = 0;
  refresh();
}

function presetFadeFinish() {
  const b = paceMultiplierToY(1.0);
  points = [
    { x: 0, y: b },
    { x: 0.75, y: b + 0.15 },
    { x: 0.9, y: b + 0.25 },
  ];
  selectedSegment = 0;
  refresh();
}

function refresh() {
  recalc();
  draw();
  renderSegmentEditor();
}

// --- Init ---

distSelect.addEventListener('change', refresh);
basePaceInput.addEventListener('input', refresh);
basePaceInput.addEventListener('blur', () => {
  const pace = parsePace(basePaceInput.value);
  if (pace > 0) basePaceInput.value = decimalToMSS(pace);
});
window.addEventListener('resize', () => { draw(); });

canvas.style.height = '300px';
refresh();
</script>

</body>
</html>
